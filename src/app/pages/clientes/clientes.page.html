<ion-header>
  <ion-toolbar>
    <ion-title>Clientes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>

    <ion-item *ngFor="let cliente of listaClientes">
      {{ cliente.cli_nombre }}
    </ion-item>

  </ion-list>

  <br>

  <ion-button expand="block" (click)="nuevoCliente()">
    Nuevo Cliente
  </ion-button>

</ion-content>

<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/clientes"></ion-back-button>
    </ion-buttons>
    <ion-title>Nuevo Cliente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Identificación</ion-label>
    <ion-input type="text" [(ngModel)]="identificacion"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Nombre completo</ion-label>
    <ion-input type="text" [(ngModel)]="nombre"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Correo electrónico</ion-label>
    <ion-input type="email" [(ngModel)]="correo"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Teléfono</ion-label>
    <ion-input type="tel" [(ngModel)]="telefono"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Dirección</ion-label>
    <ion-input type="text" [(ngModel)]="direccion"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Ciudad</ion-label>
    <ion-input type="text" [(ngModel)]="ciudad"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">País</ion-label>
    <ion-input type="text" [(ngModel)]="pais"></ion-input>
  </ion-item>

  <div class="ion-padding-top">
    <ion-button expand="block" color="primary" (click)="guardarCliente()">
      Guardar Cliente
    </ion-button>
  </div>

  <ion-toast
    [isOpen]="mostrarToast"
    [message]="mensaje"
    [color]="colorToast"
    duration="3000"
    position="bottom"
    (didDismiss)="mostrarToast = false"
  ></ion-toast>
</ion-content>

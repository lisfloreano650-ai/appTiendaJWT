<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Catálogo de Productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let p of listaProductos" lines="inset">
      <ion-thumbnail slot="start">
        <img [src]="prodService.obtenerImagen(p.imagen)" alt="Imagen" />
      </ion-thumbnail>
      <ion-label>
        <h3>{{ p.nombre }}</h3>
        <p>{{ p.descripcion }}</p>
        <p><strong>Precio: ${{ p.precio }}</strong></p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

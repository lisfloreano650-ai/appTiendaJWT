<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/clientes"></ion-back-button>
    </ion-buttons>
    <ion-title>Editar Cliente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Identificación</ion-label>
    <ion-input type="text" [(ngModel)]="cliente.cli_identificacion"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Nombre completo</ion-label>
    <ion-input type="text" [(ngModel)]="cliente.cli_nombre"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Correo electrónico</ion-label>
    <ion-input type="email" [(ngModel)]="cliente.cli_correo"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Teléfono</ion-label>
    <ion-input type="tel" [(ngModel)]="cliente.cli_telefono"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Dirección</ion-label>
    <ion-input type="text" [(ngModel)]="cliente.cli_direccion"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Ciudad</ion-label>
    <ion-input type="text" [(ngModel)]="cliente.cli_ciudad"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">País</ion-label>
    <ion-input type="text" [(ngModel)]="cliente.cli_pais"></ion-input>
  </ion-item>

  <ion-button expand="block" color="primary" (click)="guardarCambios()" class="ion-margin-top">
    Guardar Cambios
  </ion-button>

  <ion-toast
    [isOpen]="mostrarToast"
    [message]="mensaje"
    [color]="colorToast"
    duration="3000"
    position="bottom"
    (didDismiss)="mostrarToast = false"
  ></ion-toast>
</ion-content>

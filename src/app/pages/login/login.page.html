<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      label="Usuario"
      labelPlacement="floating">
    </ion-input>
  </ion-item>

  <br>

  <ion-item>
    <ion-input
      type="password"
      label="Clave"
      labelPlacement="floating">
    </ion-input>
  </ion-item>

  <br><br>

  <ion-button expand="block" (click)="ingresar()">
    Ingresar
  </ion-button>

</ion-content>
